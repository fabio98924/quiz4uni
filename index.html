<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz di esercitazione</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#06b6d4;
      --success:#16a34a;
      --danger:#dc2626;
      --muted:#94a3b8;
      --text:#e6eef8;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{
      height:100%;
      margin:0;
      background:linear-gradient(180deg,#071029 0%, #071b2a 100%);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:36px auto;
      padding:28px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      box-shadow:0 6px 30px rgba(2,6,23,0.6);
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
    }

    h1{
      font-size:20px;
      margin:0;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
    }

    button{
      background:transparent;
      border:1px solid rgba(255,255,255,0.06);
      color:var(--text);
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
    }

    button.primary{
      background:linear-gradient(90deg,var(--accent),#7dd3fc);
      color:#042027;
      border:none;
    }

    button.ghost{
      background:transparent;
      border:1px dashed rgba(255,255,255,0.12);
    }

    .center{
      display:flex;
      gap:12px;
      justify-content:center;
      margin:18px 0;
      flex-wrap:wrap;
    }

    .category-btn{
      min-width:160px;
      font-weight:600;
    }

    .card{
      background:rgba(255,255,255,0.02);
      padding:18px;
      border-radius:10px;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .progress{
      height:10px;
      background:rgba(255,255,255,0.04);
      border-radius:999px;
      overflow:hidden;
      flex:1;
      margin-left:12px;
    }

    .progress > i{
      display:block;
      height:100%;
      background:linear-gradient(90deg,var(--accent),#60a5fa);
      width:0%;
    }

    .question-area{
      min-height:160px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .question-text{
      font-size:18px;
      line-height:1.5;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .option{
      padding:12px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.04);
      cursor:pointer;
      background:rgba(255,255,255,0.01);
    }

    .option.correct{
      background:linear-gradient(90deg, rgba(22,163,74,0.12), rgba(22,163,74,0.06));
      border-color:rgba(22,163,74,0.6);
    }

    .option.wrong{
      background:linear-gradient(90deg, rgba(220,38,38,0.08), rgba(220,38,38,0.04));
      border-color:rgba(220,38,38,0.6);
    }

    .explanation{
      margin-top:8px;
      padding:10px;
      border-radius:8px;
      background:rgba(255,255,255,0.02);
      color:var(--muted);
      font-size:14px;
    }

    .controls-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:14px;
    }

    .hidden{
      display:none;
    }

    .results{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      text-align:center;
    }

    .big-percent{
      font-size:48px;
      font-weight:800;
      color:var(--accent);
    }

    .small{
      color:var(--muted);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    textarea{
      width:100%;
      min-height:120px;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      color:var(--text);
      box-sizing:border-box;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    img.qimg{
      max-width:100%;
      border-radius:8px;
      box-shadow:0 6px 18px rgba(0,0,0,0.4);
      display:block;
    }

    .solution-images{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:12px;
    }

    @media (max-width:600px){
      .wrap{
        margin:12px;
        padding:16px;
      }
    }

    #login-box{
      max-width:420px;
      margin:80px auto;
      padding:24px;
      background:rgba(11,18,32,0.95);
      border:1px solid rgba(148,163,184,0.2);
      border-radius:12px;
      box-shadow:0 10px 30px rgba(2,6,23,0.5);
      text-align:center;
    }

    #login-box input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.25);
      background:#071029;
      color:var(--text);
      box-sizing:border-box;
    }

    #login-box button{
      width:100%;
      margin-top:12px;
      padding:12px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#04202a;
      font-weight:700;
      cursor:pointer;
    }

    #errore{
      color:#f87171;
      margin-top:10px;
      font-size:14px;
    }

    #contenuto-sito{
      display:none;
    }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>Inserisci la password</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="controllaPassword()">Entra</button>
    <p id="errore"></p>
  </div>

  <div id="contenuto-sito">
    <div class="wrap">
      <header>
        <h1>Quiz di esercitazione</h1>
        <div class="controls"></div>
      </header>

      <main class="card" id="mainCard">
        <div id="startScreen">
          <p class="muted">Scegli il tipo di domande e avvia il quiz.</p>
          <div class="center">
            <button class="category-btn primary" data-type="mc" id="btnMC">Scelta multipla</button>
            <button class="category-btn" data-type="open" id="btnOpen">Domande aperte</button>
          </div>
          <div class="center">
            <button id="startBtn" class="primary">Avvia quiz</button>
          </div>
          <div class="center">
            <button id="resumeBtn" class="ghost hidden">Riprendi quiz salvato</button>
          </div>
        </div>

        <div id="quizScreen" class="hidden">
          <div class="meta">
            <div><strong id="qIndex">1 / 10</strong></div>
            <div class="progress" title="Avanzamento">
              <i id="progressBar"></i>
            </div>
          </div>

          <div class="question-area">
            <div class="question-text" id="questionText">Testo domanda</div>

            <div id="mcArea" class="options hidden" role="list"></div>

            <div id="openArea" class="hidden">
              <textarea id="openAnswer" placeholder="Scrivi qui la tua risposta..."></textarea>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <button id="showSolutionBtn">Mostra soluzione</button>
                <div style="flex:1"></div>
                <button id="selfGoodBtn" class="ghost">Ho fatto bene</button>
                <button id="selfBadBtn" class="ghost">Ho sbagliato</button>
              </div>
              <div id="openSolution" class="explanation hidden"></div>
            </div>

            <div id="explanation" class="explanation hidden"></div>
          </div>

          <div class="controls-bottom">
            <div></div>
            <div>
              <button id="nextBtn" class="primary" disabled>Prossima</button>
              <button id="endBtn" class="ghost">Termina quiz</button>
            </div>
          </div>
        </div>

        <div id="resultsScreen" class="hidden card">
          <div class="results">
            <div class="big-percent" id="percentText">0%</div>
            <div class="muted" id="scoreSummary">Totale: 0 • Corrette: 0 • Sbagliate: 0</div>
            <div class="btn-row">
              <button id="repeatErrorsBtn" class="ghost">Ripeti errori</button>
              <button id="restartBtn" class="primary">Ricomincia</button>
              <button id="homeBtn" class="ghost">Torna alla home</button>
            </div>
          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </div>

  <script>
    function controllaPassword() {
      const passwordCorretta = "TecMec";
      const passwordUtente = document.getElementById("password").value;

      if (passwordUtente === passwordCorretta) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("contenuto-sito").style.display = "block";
      } else {
        document.getElementById("errore").textContent = "Password errata";
      }
    }

    const state = {
      allQuestions: [],
      quizQuestions: [],
      currentIndex: 0,
      answers: [],
      mode: 'mc',
      incorrectIds: []
    };

    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultsScreen = document.getElementById('resultsScreen');
    const btnMC = document.getElementById('btnMC');
    const btnOpen = document.getElementById('btnOpen');
    const startBtn = document.getElementById('startBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const qIndexEl = document.getElementById('qIndex');
    const progressBar = document.getElementById('progressBar');
    const questionText = document.getElementById('questionText');
    const mcArea = document.getElementById('mcArea');
    const openArea = document.getElementById('openArea');
    const openAnswer = document.getElementById('openAnswer');
    const openSolution = document.getElementById('openSolution');
    const showSolutionBtn = document.getElementById('showSolutionBtn');
    const selfGoodBtn = document.getElementById('selfGoodBtn');
    const selfBadBtn = document.getElementById('selfBadBtn');
    const explanationEl = document.getElementById('explanation');
    const nextBtn = document.getElementById('nextBtn');
    const endBtn = document.getElementById('endBtn');
    const percentText = document.getElementById('percentText');
    const scoreSummary = document.getElementById('scoreSummary');
    const repeatErrorsBtn = document.getElementById('repeatErrorsBtn');
    const restartBtn = document.getElementById('restartBtn');
    const homeBtn = document.getElementById('homeBtn');

    btnMC.addEventListener('click', ()=>{ selectCategory('mc'); });
    btnOpen.addEventListener('click', ()=>{ selectCategory('open'); });

    function selectCategory(type){
      state.mode = type;
      btnMC.classList.toggle('primary', type === 'mc');
      btnOpen.classList.toggle('primary', type === 'open');
    }

    startBtn.addEventListener('click', async ()=>{
      await loadQuestions();
      clearSavedState();
      startQuiz();
    });

    async function loadQuestions(){
      try{
        const [res1, res2] = await Promise.all([
          fetch('questions.json').catch(()=>null),
          fetch('questions_open.json').catch(()=>null)
        ]);

        const data1 = res1 && res1.ok ? await res1.json() : [];
        const data2 = res2 && res2.ok ? await res2.json() : [];

        state.allQuestions = [...data1, ...data2];
      }catch(err){
        console.warn('Errore caricamento file domande', err);
        state.allQuestions = [
          {id:1,type:'mc',question:'Qual è il colore del cielo?',options:['Verde','Blu','Rosso'],answer:1,explanation:'Il cielo appare blu per la diffusione della luce.'},
          {id:2,type:'open',question:'Spiega brevemente la fotosintesi.',solution:'La fotosintesi è il processo con cui le piante trasformano luce, acqua e anidride carbonica in nutrienti.'}
        ];
      }
      checkResumeAvailability();
    }

    function startQuiz(fromIds=null){
      const pool = state.allQuestions.filter(q => q.type === state.mode);

      if(fromIds && fromIds.length){
        state.quizQuestions = pool.filter(q => fromIds.includes(q.id));
      } else {
        state.quizQuestions = [...pool];
      }

      shuffle(state.quizQuestions);
      state.currentIndex = 0;
      state.answers = [];
      state.incorrectIds = [];
      showScreen('quiz');
      renderQuestion();
      saveStateToStorage();
    }

    function showScreen(name){
      startScreen.classList.toggle('hidden', name !== 'start');
      quizScreen.classList.toggle('hidden', name !== 'quiz');
      resultsScreen.classList.toggle('hidden', name !== 'results');
    }

    function renderQuestion(){
      clearInteraction();

      const q = state.quizQuestions[state.currentIndex];
      if(!q){
        showResults();
        return;
      }

      qIndexEl.textContent = `${state.currentIndex + 1} / ${state.quizQuestions.length}`;
      const pct = Math.round((state.currentIndex / state.quizQuestions.length) * 100);
      progressBar.style.width = pct + '%';
      questionText.textContent = q.question;
      explanationEl.classList.add('hidden');
      explanationEl.textContent = '';

      if(q.type === 'mc'){
        mcArea.classList.remove('hidden');
        openArea.classList.add('hidden');
        renderOptions(q);
      } else {
        mcArea.classList.add('hidden');
        openArea.classList.remove('hidden');

        openAnswer.value = '';
        openSolution.classList.add('hidden');
        openSolution.innerHTML = '';
        selfGoodBtn.classList.remove('primary');
        selfBadBtn.classList.remove('primary');
        nextBtn.disabled = true;
      }
    }

    function renderOptions(q){
      mcArea.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.setAttribute('data-idx', idx);
        btn.tabIndex = 0;
        btn.innerHTML = `<strong>${idx + 1}.</strong> ${opt}`;
        btn.addEventListener('click', ()=> handleMCSelect(q, idx));
        mcArea.appendChild(btn);
      });
      nextBtn.disabled = true;
    }

    function handleMCSelect(q, idx){
      if(state.answers[state.currentIndex]) return;

      const correctIdx = q.answer;
      const optionEls = Array.from(mcArea.children);

      optionEls.forEach((el)=>{
        const i = Number(el.getAttribute('data-idx'));
        if(i === correctIdx) el.classList.add('correct');
        if(i === idx && i !== correctIdx) el.classList.add('wrong');
        el.style.pointerEvents = 'none';
      });

      const isCorrect = idx === correctIdx;
      state.answers[state.currentIndex] = {id:q.id, correct:isCorrect, userAnswer:idx};

      if(!isCorrect) state.incorrectIds.push(q.id);

      if(q.explanation){
        explanationEl.textContent = q.explanation;
        explanationEl.classList.remove('hidden');
      }

      nextBtn.disabled = false;
      afterAnswerSaved();
      nextBtn.focus();
    }

    showSolutionBtn.addEventListener('click', ()=>{
      const q = state.quizQuestions[state.currentIndex];
      if(!q) return;

      let html = '';

      if (q.solution) {
        html += `<div>${q.solution}</div>`;
      }

      if (q.images && q.images.length) {
        html += `
          <div class="solution-images">
            ${q.images.map((src) => `
              <img
                src="${src}"
                alt=""
                class="qimg"
                onerror="this.style.display='none'"
              >
            `).join('')}
          </div>
        `;
      }

      if (!html) {
        html = 'Soluzione non disponibile.';
      }

      openSolution.innerHTML = html;
      openSolution.classList.remove('hidden');
    });

    selfGoodBtn.addEventListener('click', ()=>{
      recordOpenAnswer(true);
    });

    selfBadBtn.addEventListener('click', ()=>{
      recordOpenAnswer(false);
    });

    function recordOpenAnswer(isCorrect){
      const q = state.quizQuestions[state.currentIndex];
      if(!q) return;

      state.answers[state.currentIndex] = {
        id:q.id,
        correct:isCorrect,
        userAnswer:openAnswer.value || ''
      };

      if(!isCorrect && !state.incorrectIds.includes(q.id)){
        state.incorrectIds.push(q.id);
      }

      selfGoodBtn.classList.toggle('primary', isCorrect);
      selfBadBtn.classList.toggle('primary', !isCorrect);

      explanationEl.textContent = isCorrect
        ? 'Risposta registrata come corretta.'
        : 'Risposta registrata come sbagliata.';
      explanationEl.classList.remove('hidden');

      nextBtn.disabled = false;
      afterAnswerSaved();
    }

    nextBtn.addEventListener('click', ()=>{
      state.currentIndex++;
      saveStateToStorage();

      if(state.currentIndex >= state.quizQuestions.length){
        showResults();
      } else {
        renderQuestion();
      }
    });

    function showResults(isPartial = false){
      showScreen('results');

      const totalAttempted = state.answers.filter(a => a).length;
      const correct = state.answers.filter(a => a && a.correct).length;
      const wrong = totalAttempted - correct;
      const percent = totalAttempted ? Math.round((correct / totalAttempted) * 100) : 0;

      percentText.textContent = percent + '%';
      scoreSummary.textContent = isPartial
        ? `Tentativi: ${totalAttempted} • Corrette: ${correct} • Sbagliate: ${wrong} (risultati parziali)`
        : `Totale: ${state.quizQuestions.length} • Corrette: ${correct} • Sbagliate: ${state.quizQuestions.length - correct}`;

      repeatErrorsBtn.disabled = state.incorrectIds.length === 0;
    }

    repeatErrorsBtn.addEventListener('click', ()=>{
      if(state.incorrectIds.length === 0) return;
      clearSavedState();
      startQuiz(state.incorrectIds);
    });

    restartBtn.addEventListener('click', ()=>{
      clearSavedState();
      startQuiz();
    });

    homeBtn.addEventListener('click', ()=>{
      showScreen('start');
    });

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function clearInteraction(){
      mcArea.innerHTML = '';
      openArea.classList.add('hidden');
      explanationEl.classList.add('hidden');
      explanationEl.textContent = '';
      nextBtn.disabled = true;
    }

    const STORAGE_KEY = 'quiz_state_v1';

    function saveStateToStorage(){
      try{
        const toSave = {
          quizQuestions: state.quizQuestions.map(q => q.id),
          currentIndex: state.currentIndex,
          answers: state.answers,
          mode: state.mode,
          incorrectIds: state.incorrectIds
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
        checkResumeAvailability();
      }catch(e){
        console.warn('Impossibile salvare lo stato', e);
      }
    }

    function clearSavedState(){
      localStorage.removeItem(STORAGE_KEY);
      resumeBtn.classList.add('hidden');
    }

    function loadStateFromStorage(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      try{
        return JSON.parse(raw);
      }catch(e){
        return null;
      }
    }

    function checkResumeAvailability(){
      const s = loadStateFromStorage();
      if(s && s.quizQuestions && s.quizQuestions.length > 0){
        resumeBtn.classList.remove('hidden');
      } else {
        resumeBtn.classList.add('hidden');
      }
    }

    endBtn.addEventListener('click', ()=>{
      saveStateToStorage();
      showResults(true);
    });

    resumeBtn.addEventListener('click', async ()=>{
      const s = loadStateFromStorage();
      if(!s) return;

      if(!state.allQuestions || state.allQuestions.length === 0){
        await loadQuestions();
      }

      state.quizQuestions = s.quizQuestions
        .map(id => state.allQuestions.find(q => q.id === id))
        .filter(Boolean);

      state.currentIndex = s.currentIndex || 0;
      state.answers = s.answers || [];
      state.mode = s.mode || state.mode;
      state.incorrectIds = s.incorrectIds || [];

      showScreen('quiz');
      renderQuestion();
    });

    function afterAnswerSaved(){
      saveStateToStorage();
    }

    selectCategory('mc');
    loadQuestions();
  </script>
</body>
</html>
