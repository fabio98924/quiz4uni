<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz di esercitazione</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#06b6d4;
      --success:#16a34a;
      --danger:#dc2626;
      --warning:#f59e0b;
      --muted:#94a3b8;
      --text:#e6eef8;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    html,body{
      height:100%;
      margin:0;
      background:linear-gradient(180deg,#071029 0%, #071b2a 100%);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:36px auto;
      padding:28px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      box-shadow:0 6px 30px rgba(2,6,23,0.6);
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:18px;
      gap:16px;
      flex-wrap:wrap;
    }

    h1{
      font-size:20px;
      margin:0;
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .timer-badge{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      color:var(--text);
      font-weight:700;
      font-size:14px;
      display:none;
    }

    .timer-badge.active{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    button{
      background:transparent;
      border:1px solid rgba(255,255,255,0.08);
      color:var(--text);
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      transition:0.2s ease;
    }

    button:hover{
      opacity:0.95;
    }

    button.primary{
      background:linear-gradient(90deg,var(--accent),#7dd3fc);
      color:#042027;
      border:none;
      font-weight:700;
    }

    button.ghost{
      background:transparent;
      border:1px dashed rgba(255,255,255,0.16);
    }

    button.warn{
      background:rgba(245,158,11,0.14);
      border:1px solid rgba(245,158,11,0.4);
      color:#ffd89a;
    }

    .center{
      display:flex;
      gap:12px;
      justify-content:center;
      margin:18px 0;
      flex-wrap:wrap;
    }

    .category-btn{
      min-width:160px;
      font-weight:600;
    }

    .card{
      background:rgba(255,255,255,0.02);
      padding:18px;
      border-radius:10px;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      gap:12px;
      flex-wrap:wrap;
    }

    .progress{
      height:10px;
      background:rgba(255,255,255,0.04);
      border-radius:999px;
      overflow:hidden;
      flex:1;
      margin-left:12px;
      min-width:180px;
    }

    .progress > i{
      display:block;
      height:100%;
      background:linear-gradient(90deg,var(--accent),#60a5fa);
      width:0%;
    }

    .question-area{
      min-height:160px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .question-text{
      font-size:18px;
      line-height:1.5;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .option{
      padding:12px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;
      background:rgba(255,255,255,0.02);
    }

    .option.selected{
      border-color:rgba(125,211,252,0.7);
      background:rgba(6,182,212,0.12);
    }

    .option.correct{
      background:linear-gradient(90deg, rgba(22,163,74,0.12), rgba(22,163,74,0.06));
      border-color:rgba(22,163,74,0.6);
    }

    .option.wrong{
      background:linear-gradient(90deg, rgba(220,38,38,0.08), rgba(220,38,38,0.04));
      border-color:rgba(220,38,38,0.6);
    }

    .explanation{
      margin-top:8px;
      padding:10px;
      border-radius:8px;
      background:rgba(255,255,255,0.03);
      color:var(--muted);
      font-size:14px;
    }

    .controls-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:14px;
      gap:12px;
      flex-wrap:wrap;
    }

    .hidden{
      display:none !important;
    }

    .results{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      text-align:center;
    }

    .big-percent{
      font-size:48px;
      font-weight:800;
      color:var(--accent);
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    textarea{
      width:100%;
      min-height:120px;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.08);
      background:transparent;
      color:var(--text);
      box-sizing:border-box;
      resize:vertical;
    }

    .muted{
      color:var(--muted);
      font-size:13px;
    }

    footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    #login-box{
      max-width:420px;
      margin:80px auto;
      padding:24px;
      background:rgba(11,18,32,0.95);
      border:1px solid rgba(148,163,184,0.2);
      border-radius:12px;
      box-shadow:0 10px 30px rgba(2,6,23,0.5);
      text-align:center;
    }

    #login-box input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.25);
      background:#071029;
      color:var(--text);
      box-sizing:border-box;
    }

    #login-box button{
      width:100%;
      margin-top:12px;
      padding:12px;
      border:0;
      border-radius:10px;
      background:var(--accent);
      color:#04202a;
      font-weight:700;
      cursor:pointer;
    }

    #errore{
      color:#f87171;
      margin-top:10px;
      font-size:14px;
    }

    #contenuto-sito{
      display:none;
    }

    .image-overlay{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,0.97);
      z-index:9999;
      display:flex;
      flex-direction:column;
      padding:20px;
    }

    .image-overlay.hidden{
      display:none !important;
    }

    .overlay-close{
      align-self:flex-start;
      margin-bottom:16px;
      background:linear-gradient(90deg,var(--accent),#7dd3fc);
      color:#042027;
      border:none;
      padding:12px 16px;
      border-radius:10px;
      font-weight:700;
    }

    .overlay-content{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:auto;
    }

    #overlayImage{
      max-width:100%;
      max-height:90vh;
      width:auto;
      height:auto;
      object-fit:contain;
      border-radius:12px;
      box-shadow:0 10px 40px rgba(0,0,0,0.45);
      background:#111827;
    }

    .overlay-message{
      color:var(--muted);
      font-size:16px;
      text-align:center;
      max-width:600px;
      line-height:1.5;
    }

    .nav-info{
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width:600px){
      .wrap{
        margin:12px;
        padding:16px;
      }

      .question-text{
        font-size:17px;
      }
    }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>Inserisci la password</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="controllaPassword()">Entra</button>
    <p id="errore"></p>
  </div>

  <div id="contenuto-sito">
    <div class="wrap">
      <header>
        <h1>Quiz di esercitazione</h1>
        <div class="controls">
          <div id="timerBadge" class="timer-badge">⏱ <span id="timerText">45:00</span></div>
        </div>
      </header>

      <main class="card" id="mainCard">
        <div id="startScreen">
          <p class="muted">Scegli il tipo di modalità e avvia il quiz.</p>
          <div class="center">
            <button class="category-btn primary" data-type="mc" id="btnMC">Scelta multipla</button>
            <button class="category-btn" data-type="open" id="btnOpen">Domande aperte</button>
            <button class="category-btn" data-type="sim" id="btnSim">Simulazione</button>
          </div>
          <div class="center">
            <button id="startBtn" class="primary">Avvia quiz</button>
          </div>
        </div>

        <div id="quizScreen" class="hidden">
          <div class="meta">
            <div><strong id="qIndex">1 / 10</strong></div>
            <div class="progress"><i id="progressBar"></i></div>
          </div>

          <div class="question-area">
            <div class="question-text" id="questionText">Testo domanda</div>
            <div class="nav-info" id="navInfo"></div>

            <div id="mcArea" class="options hidden"></div>

            <div id="openArea" class="hidden">
              <textarea id="openAnswer" placeholder="Scrivi qui la tua risposta..."></textarea>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <button id="showSolutionBtn">Mostra soluzione</button>
                <button id="skipBtn" class="warn">Salta</button>
                <div style="flex:1"></div>
                <button id="selfGoodBtn" class="ghost">Ho fatto bene</button>
                <button id="selfBadBtn" class="ghost">Ho sbagliato</button>
              </div>
              <div id="openSolution" class="explanation hidden"></div>
            </div>

            <div id="explanation" class="explanation hidden"></div>
          </div>

          <div class="controls-bottom">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button id="prevBtn" class="ghost">Indietro</button>
              <button id="nextBtn" class="primary">Avanti</button>
            </div>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
              <button id="endBtn" class="ghost">Termina quiz</button>
            </div>
          </div>
        </div>

        <div id="resultsScreen" class="hidden card">
          <div class="results">
            <div class="big-percent" id="percentText">0%</div>
            <div class="muted" id="scoreSummary">Totale: 0 • Corrette: 0 • Sbagliate: 0</div>
            <div class="btn-row">
              <button id="repeatErrorsBtn" class="ghost">Ripeti errori</button>
              <button id="restartBtn" class="primary">Ricomincia</button>
              <button id="homeBtn" class="ghost">Torna alla home</button>
            </div>
          </div>
        </div>
      </main>

      <footer></footer>
    </div>
  </div>

  <div id="imageOverlay" class="image-overlay hidden">
    <button id="closeOverlayBtn" class="overlay-close">Torna al quiz</button>
    <div class="overlay-content">
      <img id="overlayImage" src="" alt="Soluzione" class="hidden">
      <div id="overlayMessage" class="overlay-message hidden">Immagine non disponibile.</div>
    </div>
  </div>

  <script>
    function controllaPassword() {
      const passwordCorretta = "TecMec";
      const passwordUtente = document.getElementById("password").value;

      if (passwordUtente === passwordCorretta) {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("contenuto-sito").style.display = "block";
      } else {
        document.getElementById("errore").textContent = "Password errata";
      }
    }

    const state = {
      allQuestions: [],
      quizQuestions: [],
      currentIndex: 0,
      answers: [],
      mode: 'mc',
      incorrectIds: [],
      skippedIds: [],
      isSimulation: false,
      simulationEndedByTime: false,
      timerSeconds: 45 * 60,
      timerInterval: null
    };

    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultsScreen = document.getElementById('resultsScreen');
    const btnMC = document.getElementById('btnMC');
    const btnOpen = document.getElementById('btnOpen');
    const btnSim = document.getElementById('btnSim');
    const startBtn = document.getElementById('startBtn');
    const qIndexEl = document.getElementById('qIndex');
    const progressBar = document.getElementById('progressBar');
    const questionText = document.getElementById('questionText');
    const navInfo = document.getElementById('navInfo');
    const mcArea = document.getElementById('mcArea');
    const openArea = document.getElementById('openArea');
    const openAnswer = document.getElementById('openAnswer');
    const openSolution = document.getElementById('openSolution');
    const showSolutionBtn = document.getElementById('showSolutionBtn');
    const skipBtn = document.getElementById('skipBtn');
    const selfGoodBtn = document.getElementById('selfGoodBtn');
    const selfBadBtn = document.getElementById('selfBadBtn');
    const explanationEl = document.getElementById('explanation');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const endBtn = document.getElementById('endBtn');
    const percentText = document.getElementById('percentText');
    const scoreSummary = document.getElementById('scoreSummary');
    const repeatErrorsBtn = document.getElementById('repeatErrorsBtn');
    const restartBtn = document.getElementById('restartBtn');
    const homeBtn = document.getElementById('homeBtn');

    const imageOverlay = document.getElementById('imageOverlay');
    const overlayImage = document.getElementById('overlayImage');
    const overlayMessage = document.getElementById('overlayMessage');
    const closeOverlayBtn = document.getElementById('closeOverlayBtn');

    const timerBadge = document.getElementById('timerBadge');
    const timerText = document.getElementById('timerText');

    btnMC.addEventListener('click', ()=> selectCategory('mc'));
    btnOpen.addEventListener('click', ()=> selectCategory('open'));
    btnSim.addEventListener('click', ()=> selectCategory('sim'));

    function selectCategory(type){
      state.mode = type;
      btnMC.classList.toggle('primary', type === 'mc');
      btnOpen.classList.toggle('primary', type === 'open');
      btnSim.classList.toggle('primary', type === 'sim');
    }

    startBtn.addEventListener('click', async ()=>{
      await loadQuestions();
      startQuiz();
    });

    async function loadQuestions(){
      const [res1, res2] = await Promise.all([
        fetch('questions.json').catch(()=>null),
        fetch('questions_open.json').catch(()=>null)
      ]);

      const data1 = res1 && res1.ok ? await res1.json() : [];
      const data2 = res2 && res2.ok ? await res2.json() : [];
      state.allQuestions = [...data1, ...data2];
    }

    function startQuiz(fromIds=null){
      stopTimer();
      state.simulationEndedByTime = false;

      const mcPool = state.allQuestions.filter(q => q.type === 'mc');
      const openPool = state.allQuestions.filter(q => q.type === 'open');

      if(state.mode === 'sim'){
        state.isSimulation = true;
        const mcSelected = sampleQuestions(mcPool, 4);
        const openSelected = sampleQuestions(openPool, 6);
        state.quizQuestions = [...mcSelected, ...openSelected];
        state.timerSeconds = 45 * 60;
        startTimer();
      } else {
        state.isSimulation = false;
        hideTimer();
        const pool = state.allQuestions.filter(q => q.type === state.mode);
        state.quizQuestions = fromIds?.length ? pool.filter(q => fromIds.includes(q.id)) : [...pool];
        shuffle(state.quizQuestions);
      }

      state.currentIndex = 0;
      state.answers = Array(state.quizQuestions.length).fill(null).map(() => ({
        id: null,
        correct: null,
        userAnswer: null,
        skipped: false,
        viewedSolution: false
      }));
      state.incorrectIds = [];
      state.skippedIds = [];
      showScreen('quiz');
      renderQuestion();
    }

    function sampleQuestions(arr, count){
      const copy = [...arr];
      shuffle(copy);
      return copy.slice(0, Math.min(count, copy.length));
    }

    function showScreen(name){
      startScreen.classList.toggle('hidden', name !== 'start');
      quizScreen.classList.toggle('hidden', name !== 'quiz');
      resultsScreen.classList.toggle('hidden', name !== 'results');
    }

    function renderQuestion(){
      closeOverlay();
      const q = state.quizQuestions[state.currentIndex];
      if(!q) return;

      const answerState = state.answers[state.currentIndex] || {};
      qIndexEl.textContent = `${state.currentIndex + 1} / ${state.quizQuestions.length}`;
      progressBar.style.width = `${((state.currentIndex + 1) / state.quizQuestions.length) * 100}%`;

      questionText.textContent = q.question;

      if(state.isSimulation){
        navInfo.textContent = state.currentIndex < 4
          ? 'Sezione 1: Scelta multipla'
          : 'Sezione 2: Domande aperte';
      } else {
        navInfo.textContent = q.type === 'mc' ? 'Domanda a scelta multipla' : 'Domanda aperta';
      }

      explanationEl.classList.add('hidden');
      explanationEl.textContent = '';
      openSolution.classList.add('hidden');
      openSolution.textContent = '';

      prevBtn.disabled = state.currentIndex === 0;
      nextBtn.textContent = state.currentIndex === state.quizQuestions.length - 1 ? 'Concludi' : 'Avanti';

      if(q.type === 'mc'){
        mcArea.classList.remove('hidden');
        openArea.classList.add('hidden');
        renderOptions(q, answerState);
      } else {
        mcArea.classList.add('hidden');
        openArea.classList.remove('hidden');

        openAnswer.value = answerState.userAnswer && typeof answerState.userAnswer === 'string'
          ? answerState.userAnswer
          : '';

        selfGoodBtn.classList.toggle('primary', answerState.correct === true && !answerState.skipped);
        selfBadBtn.classList.toggle('primary', answerState.correct === false && !answerState.skipped);

        if(answerState.skipped){
          explanationEl.textContent = 'Questa domanda è stata saltata.';
          explanationEl.classList.remove('hidden');
        } else if(answerState.correct === true){
          explanationEl.textContent = 'Risposta registrata come corretta.';
          explanationEl.classList.remove('hidden');
        } else if(answerState.correct === false){
          explanationEl.textContent = 'Risposta registrata come sbagliata.';
          explanationEl.classList.remove('hidden');
        }
      }
    }

    function renderOptions(q, saved){
      mcArea.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.setAttribute('data-idx', idx);
        btn.innerHTML = `<strong>${idx + 1}.</strong> ${opt}`;

        if(saved && saved.userAnswer === idx){
          btn.classList.add('selected');
        }

        btn.addEventListener('click', ()=>{
          saveMCAnswer(q, idx);
          renderQuestion();
        });

        mcArea.appendChild(btn);
      });

      if(saved && saved.userAnswer !== null && saved.userAnswer !== undefined){
        const correctIdx = q.answer;
        const selectedIdx = saved.userAnswer;
        Array.from(mcArea.children).forEach((el)=>{
          const i = Number(el.getAttribute('data-idx'));
          if(i === correctIdx) el.classList.add('correct');
          if(i === selectedIdx && i !== correctIdx) el.classList.add('wrong');
        });

        if(q.explanation){
          explanationEl.textContent = q.explanation;
          explanationEl.classList.remove('hidden');
        }
      }
    }

    function saveMCAnswer(q, idx){
      const isCorrect = idx === q.answer;
      state.answers[state.currentIndex] = {
        id: q.id,
        correct: isCorrect,
        userAnswer: idx,
        skipped: false,
        viewedSolution: false
      };
      recomputeTracking();
    }

    openAnswer.addEventListener('input', ()=>{
      const prev = state.answers[state.currentIndex] || {};
      const q = state.quizQuestions[state.currentIndex];
      state.answers[state.currentIndex] = {
        id: q.id,
        correct: prev.correct ?? null,
        userAnswer: openAnswer.value,
        skipped: prev.skipped ?? false,
        viewedSolution: prev.viewedSolution ?? false
      };
    });

    showSolutionBtn.addEventListener('click', ()=>{
      const q = state.quizQuestions[state.currentIndex];
      const prev = state.answers[state.currentIndex] || {};

      state.answers[state.currentIndex] = {
        id: q.id,
        correct: prev.correct ?? null,
        userAnswer: openAnswer.value,
        skipped: prev.skipped ?? false,
        viewedSolution: true
      };

      if(q.solution){
        openSolution.textContent = q.solution;
        openSolution.classList.remove('hidden');
      }

      if(q.images && q.images.length){
        openImageFullscreen(q.images[0]);
      } else {
        openOverlayMessage('Immagine non disponibile.');
      }
    });

    skipBtn.addEventListener('click', ()=>{
      const q = state.quizQuestions[state.currentIndex];
      state.answers[state.currentIndex] = {
        id: q.id,
        correct: null,
        userAnswer: openAnswer.value || '',
        skipped: true,
        viewedSolution: false
      };
      recomputeTracking();
      renderQuestion();
    });

    selfGoodBtn.addEventListener('click', ()=> recordOpenAnswer(true));
    selfBadBtn.addEventListener('click', ()=> recordOpenAnswer(false));

    function recordOpenAnswer(isCorrect){
      const q = state.quizQuestions[state.currentIndex];
      state.answers[state.currentIndex] = {
        id: q.id,
        correct: isCorrect,
        userAnswer: openAnswer.value || '',
        skipped: false,
        viewedSolution: true
      };
      recomputeTracking();
      renderQuestion();
    }

    prevBtn.addEventListener('click', ()=>{
      if(state.currentIndex > 0){
        state.currentIndex--;
        renderQuestion();
      }
    });

    nextBtn.addEventListener('click', ()=>{
      if(state.currentIndex < state.quizQuestions.length - 1){
        state.currentIndex++;
        renderQuestion();
      } else {
        showResults();
      }
    });

    endBtn.addEventListener('click', ()=>{
      showResults(true);
    });

    function recomputeTracking(){
      state.incorrectIds = [];
      state.skippedIds = [];

      state.answers.forEach(a => {
        if(!a || !a.id) return;
        if(a.skipped){
          if(!state.skippedIds.includes(a.id)) state.skippedIds.push(a.id);
          return;
        }
        if(a.correct === false){
          if(!state.incorrectIds.includes(a.id)) state.incorrectIds.push(a.id);
        }
      });
    }

    function showResults(isPartial = false){
      stopTimer();
      recomputeTracking();
      showScreen('results');

      const answered = state.answers.filter(a => a && a.id);
      const attempted = answered.filter(a => !a.skipped && a.correct !== null);
      const correct = attempted.filter(a => a.correct === true).length;
      const wrong = attempted.filter(a => a.correct === false).length;
      const skipped = answered.filter(a => a.skipped).length;
      const percent = attempted.length ? Math.round((correct / attempted.length) * 100) : 0;

      percentText.textContent = percent + '%';

      if(state.isSimulation && state.simulationEndedByTime){
        scoreSummary.textContent = `Tempo scaduto • Valutate: ${attempted.length} • Corrette: ${correct} • Sbagliate: ${wrong} • Saltate: ${skipped}`;
      } else if(isPartial){
        scoreSummary.textContent = `Risultato parziale • Valutate: ${attempted.length} • Corrette: ${correct} • Sbagliate: ${wrong} • Saltate: ${skipped}`;
      } else {
        scoreSummary.textContent = `Valutate: ${attempted.length} • Corrette: ${correct} • Sbagliate: ${wrong} • Saltate: ${skipped}`;
      }

      repeatErrorsBtn.disabled = state.incorrectIds.length === 0 || state.isSimulation;
    }

    repeatErrorsBtn.addEventListener('click', ()=>{
      if(state.incorrectIds.length === 0 || state.isSimulation) return;

      const mcErrors = state.allQuestions.filter(q => q.type === 'mc' && state.incorrectIds.includes(q.id));
      const openErrors = state.allQuestions.filter(q => q.type === 'open' && state.incorrectIds.includes(q.id));

      if(mcErrors.length > 0){
        selectCategory('mc');
      } else if(openErrors.length > 0){
        selectCategory('open');
      }

      startQuiz(state.incorrectIds);
    });

    restartBtn.addEventListener('click', ()=>{
      startQuiz();
    });

    homeBtn.addEventListener('click', ()=>{
      stopTimer();
      hideTimer();
      showScreen('start');
    });

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function openImageFullscreen(src){
      overlayImage.classList.add('hidden');
      overlayMessage.classList.add('hidden');
      imageOverlay.classList.remove('hidden');

      overlayImage.onload = () => {
        overlayMessage.classList.add('hidden');
        overlayImage.classList.remove('hidden');
      };

      overlayImage.onerror = () => {
        overlayImage.classList.add('hidden');
        overlayMessage.textContent = 'Immagine non disponibile.';
        overlayMessage.classList.remove('hidden');
      };

      overlayImage.src = src;
    }

    function openOverlayMessage(message){
      overlayImage.classList.add('hidden');
      overlayImage.src = '';
      overlayMessage.textContent = message;
      overlayMessage.classList.remove('hidden');
      imageOverlay.classList.remove('hidden');
    }

    closeOverlayBtn.addEventListener('click', closeOverlay);
    imageOverlay.addEventListener('click', (e)=>{
      if(e.target === imageOverlay) closeOverlay();
    });

    function closeOverlay(){
      imageOverlay.classList.add('hidden');
      overlayImage.src = '';
      overlayImage.classList.add('hidden');
      overlayMessage.classList.add('hidden');
    }

    function startTimer(){
      showTimer();
      updateTimerUI();
      stopTimer();

      state.timerInterval = setInterval(() => {
        state.timerSeconds--;
        updateTimerUI();

        if(state.timerSeconds <= 0){
          state.timerSeconds = 0;
          updateTimerUI();
          state.simulationEndedByTime = true;
          showResults();
        }
      }, 1000);
    }

    function stopTimer(){
      if(state.timerInterval){
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
    }

    function showTimer(){
      timerBadge.classList.add('active');
    }

    function hideTimer(){
      timerBadge.classList.remove('active');
    }

    function updateTimerUI(){
      const min = String(Math.floor(state.timerSeconds / 60)).padStart(2, '0');
      const sec = String(state.timerSeconds % 60).padStart(2, '0');
      timerText.textContent = `${min}:${sec}`;
    }

    selectCategory('mc');
    loadQuestions();
  </script>
</body>
</html>
